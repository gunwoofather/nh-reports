      const isEnd = false;
      const isKey = i === f.keyStep;
      return `<span class="fs${isKey ? ' key' : ''}">${s}</span>${i < f.steps.length - 1 ? '<span class="arrow">→</span>' : ''}`;
    }).join('');
    card.innerHTML = `
      <div class="flow-header">
        <div class="flow-rank">${f.rank}</div>
        <div style="flex:1">
          <div class="flow-title">${f.title}<span class="badge ${f.badge}">${f.badgeText}</span></div>
          <div class="flow-meta"><span>${f.sessions}</span></div>
        </div>
      </div>
      <div class="flow-steps">
        ${steps}
        <span class="arrow">→</span>
        <span class="fs end">해외주식 주문</span>
      </div>
      <div class="flow-insight">${f.insight}</div>`;
    el.appendChild(card);
  });
}

function buildTypes() {
  const el = document.getElementById('type-grid');
  types.forEach(t => {
    const div = document.createElement('div');
    div.className = 'type-card';
    div.style.background = t.color;
    div.innerHTML = `
      <div class="type-title" style="color:${t.textColor}">${t.title}</div>
      <div class="type-share" style="color:${t.textColor}">${t.share}</div>
      <div class="type-desc">${t.desc}</div>
      <div class="type-flows" style="margin-top:6px">해당: ${t.flows}</div>`;
    el.appendChild(div);
  });
}

function buildBars(data, id) {
  const el = document.getElementById(id);
  const max = Math.max(...data.map(d => d.cnt));
  data.forEach(d => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <span class="bar-label">${d.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(d.cnt/max*100).toFixed(0)}%;background:${d.color}"></div></div>
      <span class="bar-val">${d.cnt}</span>`;
    el.appendChild(row);
  });
}

function show(id) {
  ['flows','type','freq','insight'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===id?'':'none';
  });
  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${id}'`));
  });
}
